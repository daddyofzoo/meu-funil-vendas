<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade - Extensão Natural</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a2b1f; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; max-width: 500px; width: 100%; border-radius: 32px; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center; }
        h1 { color: #1e3a2f; margin-bottom: 16px; }
        .price { font-size: 2.5rem; color: #c97e2a; font-weight: bold; margin: 20px 0; }
        button { background: #2c6e49; color: white; border: none; width: 100%; padding: 16px; border-radius: 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin: 10px 0; }
        button:hover { background: #1e4a33; }
        .loader { display: none; margin: 20px 0; }
        .error { color: red; margin: 10px 0; }
        .skip { color: #666; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>
<div class="card">
    <h1>🔬 Extensão Natural</h1>
    <p>Adicione os 3 ingredientes secretos que aceleram os resultados em 300%</p>
    <div class="price">997 MZN</div>
    <p><small>✔️ Aumento de até 16cm<br>✔️ Resultados em 7 dias<br>✔️ Testosterona +200%</small></p>
    
    <button id="payButton">💳 Comprar agora com 1 clique</button>
    <div class="loader" id="loader">⏳ Processando pagamento... Confirme no seu M-Pesa/eMola</div>
    <div class="error" id="errorMsg"></div>
    <a href="upsell2.html" class="skip">Não, quero só o método básico (pular)</a>
</div>

<script>
    const amount = 997;
    const reference = 'EXTENSAO_' + Date.now();

    // Recupera dados do cliente
    const phone = sessionStorage.getItem('userPhone');
    const method = sessionStorage.getItem('paymentMethod') || 'mpesa'; // fallback
    const clientId = 'a1edafbb-3e36-4fea-bccc-720cf385f7ef';
    const walletId = method === 'mpesa' ? '999863' : '999864';

    if (!phone) {
        document.getElementById('errorMsg').innerText = 'Sessão expirada. Volte ao início.';
        document.getElementById('payButton').disabled = true;
    }

    document.getElementById('payButton').onclick = async () => {
        const btn = document.getElementById('payButton');
        const loader = document.getElementById('loader');
        const errorDiv = document.getElementById('errorMsg');
        
        btn.disabled = true;
        loader.style.display = 'block';
        errorDiv.innerText = '';

        try {
            const response = await fetch('/api/payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    client_id: clientId,
                    amount: amount.toString(),
                    phone: phone,
                    reference: reference,
                    wallet_id: walletId,
                    method: method
                })
            });
            const data = await response.json();
            if (response.ok && data.success) {
                // Pagamento do upsell concluído -> vai para o próximo upsell
                sessionStorage.setItem('upsell1_purchased', 'true');
                window.location.href = 'upsell2.html';
            } else {
                errorDiv.innerText = data.message || 'Erro no pagamento. Tente novamente.';
                btn.disabled = false;
                loader.style.display = 'none';
            }
        } catch (err) {
            errorDiv.innerText = 'Erro de conexão.';
            btn.disabled = false;
            loader.style.display = 'none';
        }
    };
</script>
</body>
</html>
